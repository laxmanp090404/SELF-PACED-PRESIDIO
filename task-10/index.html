<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Page CSS only Website</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li class="homelink"><a href="#home">Home</a></li>
                <li class="aboutlink"><a href="#about">About</a></li>
                <li class="servicelink"><a href="#services">Services</a></li>
                <li class="contactlink"><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main class="pagecontainer">
        <div class="about page" id="about"><p>AboutPage</p></div>
        <div class="services page" id="services"><p>Services Page</p></div>
        <div class="contact page" id="contact"><p>Contact Page</p></div>
        <div class="home page" id="home"><p>HomePage</p></div>
    </main>
    <footer>
        <p>&copy; 2026 Multi-section CSS only. Coded by Laxman Panjalingam.</p>
    </footer>
</body>
</html>
