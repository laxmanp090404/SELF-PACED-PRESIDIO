<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accordian</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <!-- 3 sections for my accordian  -->
        <section>
            <!-- hidden checkbox -->
            <input type="checkbox" name="about" id="about">
            <label for="about">About</label>
            <p class="about">
                Hi , I am Laxman . <br/>
                I LOVE TO CODE (LOVES DEBUGGING MORE)
            </p>
        </section>
        <section>
            <input type="checkbox" name="skills" id="skills">
            <!-- operate checked state via labels  -->
            <label for="skills">Skills</label>
            <p class="skills">
                I am skilled(i am pretty much sure) in MERN stack(Mongodb , ExpressJs , ReactJs and NodeJs for those wdk)
            </p>
        </section>
        <section>
            <input type="checkbox" name="experience" id="experience">
            <label for="experience">Experience</label>
            <p class="experience">
                I am currently an Associate Software Engineer Intern @ Presidio
                <br/>
                previously I was a Backend Intern @ IEEE GEMS YP
            </p>
        </section>
    </main>
</body>
</html>
