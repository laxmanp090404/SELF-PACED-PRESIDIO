<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Collections</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- skipped header as task focused on card-->
    <section class="cardcontainer">
        <!-- section heading  -->
         <h2>Anime Collection</h2>
         <!-- section content  -->
        <!-- card component -->
         <article class="card">
            <!-- split into half  -->
            <img src="./assets/onepiece.png" alt="anime poster">
            <div class="animedetails">
                <h3 class="cardtitle">One Piece</h3>
                <p>Monkey D. Luffy sails with his crew of Straw Hat Pirates through the Grand Line to find the treasure One Piece and become the new king of the pirates.</p>
            </div>
        </article>
    </section>
</body>
</html>
